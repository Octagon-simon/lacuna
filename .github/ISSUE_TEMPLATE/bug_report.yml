name: Bug Report
description: lacuna failed to generate or fix tests, produced incorrect output, or crashed
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more detail you provide, the faster we can fix it.
        **Remove your API key from any config you paste below.**

  - type: input
    id: version
    attributes:
      label: lacuna version
      description: Run `lacuna --version` to find this
      placeholder: "0.1.7"
    validations:
      required: true

  - type: dropdown
    id: runner
    attributes:
      label: Test runner
      options:
        - Vitest
        - Jest
        - Mocha
        - pytest
        - PHPUnit / Pest
        - Go test
        - RSpec
        - Other
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      description: The model you configured in .lacuna.json or passed via --model
      placeholder: "deepseek-chat / claude-sonnet-4-6 / gpt-4o / etc."
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework / stack
      options:
        - TypeScript / JavaScript (no framework)
        - React
        - React Native / Expo
        - Next.js
        - Vue
        - Python
        - PHP
        - Other
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Which command failed?
      options:
        - lacuna generate
        - lacuna fix
        - lacuna analyze
        - lacuna init
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did lacuna do? What did you expect it to do?
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Terminal output from lacuna
      description: Paste the full output from the failing command. This is the most important field.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: .lacuna.json config
      description: Paste your config. Replace your API key value with "***".
      render: json

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Source file snippet, generated test snippet, anything that helps reproduce the issue.
