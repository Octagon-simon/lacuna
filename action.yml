name: lacuna-cli
description: Agentic test coverage — find gaps, generate tests, verify they pass, report on PRs
author: octagon-simon

branding:
  icon: shield
  color: purple

inputs:
  mode:
    description: "'analyze' (read-only report) or 'generate' (write tests)"
    required: false
    default: generate
  threshold:
    description: Minimum line coverage percentage required to pass
    required: false
    default: '80'
  model:
    description: "Model to use — any lacuna preset: deepseek, deepseek-r1, claude-sonnet-4-6, claude-opus-4-7, gpt-4o, gemini, gemini-flash, groq, openrouter, ollama. Or pass a full model name."
    required: false
    default: deepseek
  source-dir:
    description: Directory containing source files
    required: false
    default: src
  coverage-dir:
    description: Directory where coverage output is written
    required: false
    default: coverage
  anthropic-api-key:
    description: Anthropic API key — required when using Claude models
    required: false
  openai-api-key:
    description: OpenAI API key — required when using GPT-4o
    required: false
  gemini-api-key:
    description: Google Gemini API key — required when using Gemini models
    required: false
  deepseek-api-key:
    description: DeepSeek API key — required when using DeepSeek models
    required: false
  groq-api-key:
    description: Groq API key — required when using Groq models
    required: false
  openrouter-api-key:
    description: OpenRouter API key — required when using OpenRouter
    required: false
  github-token:
    description: GitHub token for posting PR comments and status checks
    required: false
    default: ${{ github.token }}
  workers:
    description: Number of parallel workers (each handles one file at a time)
    required: false
    default: '1'
  post-comment:
    description: Post a coverage report comment on the PR
    required: false
    default: 'true'

outputs:
  coverage-before:
    description: Coverage percentage before lacuna ran
    value: ${{ steps.report.outputs.coverage-before }}
  coverage-after:
    description: Coverage percentage after lacuna ran
    value: ${{ steps.report.outputs.coverage-after }}
  passed:
    description: Whether coverage meets the threshold
    value: ${{ steps.report.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install lacuna
      shell: bash
      run: npm install -g lacuna-cli@latest

    - name: Run lacuna
      id: lacuna
      shell: bash
      run: |
        lacuna ${{ inputs.mode }} \
          --model ${{ inputs.model }} \
          --format json \
          --output lacuna-report.json \
          --threshold ${{ inputs.threshold }} \
          --workers ${{ inputs.workers }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        DEEPSEEK_API_KEY: ${{ inputs.deepseek-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}

    - name: Parse report outputs
      id: report
      shell: bash
      run: node ${{ github.action_path }}/dist/ci/parse-outputs.js

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: node ${{ github.action_path }}/dist/ci/comment.js
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        LACUNA_REPORT_FILE: lacuna-report.json
